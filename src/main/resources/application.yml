spring:
  profiles:
    active: dev
  application:
    name: basePlatform

server:
  port: 8088

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: com.md.basePlatform.config.mybatis
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.md.basePlatform.interceptor: INFO
