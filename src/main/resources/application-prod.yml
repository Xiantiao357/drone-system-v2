spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/drone?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
    username: root
    password: ${DB_PASSWORD:}
    type: com.alibaba.druid.pool.DruidDataSource
    initialization-mode: never

druid:
  initial-size: 2
  min-idle: 2
  max-active: 10
